<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Interview Overlay</title>
    <link rel="stylesheet" href="src/app.css">
</head>

<body style="--wails-draggable:drag">
    <div id="app">
        <div id="titlebar" onmousedown="dragStart(event)">
            <div class="t-left">
                <div id="dot"></div>
                <span id="t-title">Interview</span>
            </div>
            <span id="t-status">idle</span>
            <div class="t-btns">
                <button class="ico" onclick="window.go.main.App.Minimize()">−</button>
                <button class="ico x" onclick="window.go.main.App.Close()">×</button>
            </div>
        </div>

        <div id="rec-bar">
            <button id="rec-btn" onclick="toggleRec()">▶ Start</button>
        </div>

        <div id="sig-bar">
            <span class="sig-lbl">signals</span>
            <span id="no-sig">—</span>
        </div>

        <div id="tx-area">
            <div id="partial" class="line" style="display:none">
                <span class="lbl mic" id="p-lbl">MIC</span>
                <span class="tx partial" id="p-tx"></span>
            </div>
        </div>

        <div id="save-bar">
            <button id="save-btn" onclick="saveFiles()">↓ Save to Desktop</button>
        </div>

        <div id="err-log"></div>

    </div>

    <script src="/wails/ipc.js"></script>
    <script src="/wails/runtime.js"></script>
    <script src="src/main.js"></script>

</body>

</html>
