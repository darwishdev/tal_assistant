<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Interview Overlay</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --bg: rgba(8, 8, 10, 0.90);
            --line: rgba(255, 255, 255, 0.06);
            --mic: #4ade80;
            --spk: #60a5fa;
            --sig: #f59e0b;
            --dim: rgba(255, 255, 255, 0.30);
            --txt: rgba(255, 255, 255, 0.88);
            --red: #ef4444;
        }

        html,
        body {
            width: 100%;
            height: 100vh;
            background: transparent;
            font-family: 'IBM Plex Sans', sans-serif;
            font-size: 13px;
            color: var(--txt);
            overflow: hidden;
            user-select: none;
        }

        #app {
            width: 100%;
            height: 100vh;
            background: var(--bg);
            border-radius: 12px;
            border: 1px solid var(--line);
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            overflow: hidden;
        }

        /* ── Titlebar ── */
        #titlebar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            border-bottom: 1px solid var(--line);
            cursor: move;
            flex-shrink: 0;
        }

        .t-left {
            display: flex;
            align-items: center;
            gap: 8px
        }

        #dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #2a2a2a;
            transition: background .3s, box-shadow .3s;
        }

        #dot.rec {
            background: var(--red);
            box-shadow: 0 0 7px var(--red);
            animation: blink 1.4s infinite
        }

        #dot.con {
            background: var(--sig);
            box-shadow: 0 0 7px var(--sig)
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: .3
            }
        }

        #t-title {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 10px;
            font-weight: 500;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--dim);
        }

        #t-status {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 10px;
            color: var(--dim);
        }

        .t-btns {
            display: flex;
            gap: 5px
        }

        .ico {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.05);
            color: var(--dim);
            cursor: pointer;
            font-size: 13px;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background .15s, color .15s;
        }

        .ico:hover {
            background: rgba(255, 255, 255, 0.12);
            color: var(--txt)
        }

        .ico.x:hover {
            background: var(--red);
            color: #fff
        }

        /* ── Record button ── */
        #rec-bar {
            padding: 10px 12px;
            border-bottom: 1px solid var(--line);
            flex-shrink: 0
        }

        #rec-btn {
            width: 100%;
            padding: 8px 0;
            border-radius: 8px;
            border: none;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: .06em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all .2s;
            background: rgba(74, 222, 128, .10);
            color: var(--mic);
            border: 1px solid rgba(74, 222, 128, .20);
        }

        #rec-btn:hover {
            background: rgba(74, 222, 128, .18)
        }

        #rec-btn.stop {
            background: rgba(239, 68, 68, .10);
            color: var(--red);
            border-color: rgba(239, 68, 68, .20);
        }

        #rec-btn.stop:hover {
            background: rgba(239, 68, 68, .18)
        }

        /* ── Signals ── */
        #sig-bar {
            padding: 8px 12px;
            border-bottom: 1px solid var(--line);
            min-height: 34px;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
            flex-shrink: 0;
        }

        .sig-lbl {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: .1em;
            color: var(--dim);
            flex-shrink: 0;
        }

        .tag {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            background: rgba(245, 158, 11, .10);
            color: var(--sig);
            border: 1px solid rgba(245, 158, 11, .22);
            animation: tagIn .25s ease;
        }

        @keyframes tagIn {
            from {
                opacity: 0;
                transform: scale(.8)
            }

            to {
                opacity: 1;
                transform: scale(1)
            }
        }

        #no-sig {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 10px;
            color: var(--dim)
        }

        /* ── Transcript ── */
        #tx-area {
            flex: 1;
            overflow-y: auto;
            padding: 10px 12px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            scroll-behavior: smooth;
        }

        #tx-area::-webkit-scrollbar {
            width: 2px
        }

        #tx-area::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, .08);
            border-radius: 2px
        }

        .line {
            display: flex;
            gap: 7px;
            align-items: flex-start;
            animation: lineIn .2s ease
        }

        @keyframes lineIn {
            from {
                opacity: 0;
                transform: translateY(3px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .lbl {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 9px;
            font-weight: 500;
            letter-spacing: .04em;
            text-transform: uppercase;
            flex-shrink: 0;
            margin-top: 2px;
            padding: 1px 5px;
            border-radius: 3px;
        }

        .lbl.mic {
            color: var(--mic);
            background: rgba(74, 222, 128, .07)
        }

        .lbl.speaker {
            color: var(--spk);
            background: rgba(96, 165, 250, .07)
        }

        .tx {
            line-height: 1.5;
            font-size: 12.5px;
            color: var(--txt)
        }

        .tx.partial {
            color: var(--dim);
            font-style: italic
        }

        /* ── Save button ── */
        #save-bar {
            padding: 8px 12px;
            border-top: 1px solid var(--line);
            flex-shrink: 0
        }

        #save-btn {
            width: 100%;
            padding: 6px 0;
            border-radius: 8px;
            border: none;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 10px;
            letter-spacing: .06em;
            text-transform: uppercase;
            cursor: pointer;
            background: rgba(96, 165, 250, .08);
            color: var(--spk);
            border: 1px solid rgba(96, 165, 250, .18);
            transition: all .2s;
        }

        #save-btn:hover {
            background: rgba(96, 165, 250, .16)
        }

        /* ── Error log ── */
        #err-log {
            display: none;
            max-height: 90px;
            overflow-y: auto;
            border-top: 1px solid rgba(239, 68, 68, .18);
            flex-shrink: 0;
        }

        .err-line {
            padding: 4px 12px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 10px;
            color: var(--red);
            background: rgba(239, 68, 68, .06);
            border-bottom: 1px solid rgba(239, 68, 68, .08);
            white-space: pre-wrap;
            word-break: break-all;
        }

        #err-log::-webkit-scrollbar {
            width: 2px
        }

        #err-log::-webkit-scrollbar-thumb {
            background: rgba(239, 68, 68, .3)
        }
    </style>
</head>

<body>
    <div id="app">

        <div id="titlebar" onmousedown="dragStart(event)">
            <div class="t-left">
                <div id="dot"></div>
                <span id="t-title">Interview</span>
            </div>
            <span id="t-status">idle</span>
            <div class="t-btns">
                <button class="ico" onclick="window.go.main.App.Minimize()">−</button>
                <button class="ico x" onclick="window.go.main.App.Close()">×</button>
            </div>
        </div>

        <div id="rec-bar">
            <button id="rec-btn" onclick="toggleRec()">▶ Start</button>
        </div>

        <div id="sig-bar">
            <span class="sig-lbl">signals</span>
            <span id="no-sig">—</span>
        </div>

        <div id="tx-area">
            <div id="partial" class="line" style="display:none">
                <span class="lbl mic" id="p-lbl">Mic</span>
                <span class="tx partial" id="p-tx"></span>
            </div>
        </div>

        <div id="save-bar">
            <button id="save-btn" onclick="saveFiles()">↓ Save to Desktop</button>
        </div>

        <div id="err-log"></div>

    </div>

    <script src="/wails/ipc.js"></script>
    <script src="/wails/runtime.js"></script>
    <script>
        // ── State ──────────────────────────────────────────────────────────────────
        let recording = false
        let srtLines = []
        let sigLines = [`# Signals — ${new Date().toISOString()}`, '']

        const MIC_DEVICE = 'Microphone (Realtek High Definition Audio)'
        const SPEAKER_DEVICE = 'CABLE Output (VB-Audio Virtual Cable)'

        // ── Wails event listeners ──────────────────────────────────────────────────
        window.runtime.EventsOn('status', (s) => {
            const dot = document.getElementById('dot')
            const btn = document.getElementById('rec-btn')
            const stat = document.getElementById('t-status')
            dot.className = ''
            if (s === 'recording') {
                dot.classList.add('rec')
                btn.textContent = '■ Stop'; btn.className = 'stop'
                stat.textContent = 'recording'; recording = true
            } else if (s === 'connecting') {
                dot.classList.add('con')
                btn.textContent = 'connecting...'; stat.textContent = 'connecting'
            } else {
                btn.textContent = '▶ Start'; btn.className = ''
                stat.textContent = 'idle'; recording = false
                hidePartial()
            }
        })

        window.runtime.EventsOn('transcript', (d) => {
            if (d.isFinal) {
                hidePartial()
                addLine(d.label, d.text)
                // Build SRT entry
                srtLines.push(`${srtLines.filter(l => l.match(/^\d+$/)).length + 1}`)
                srtLines.push(`${msToSRT(d.startMs)} --> ${msToSRT(d.endMs)}`)
                srtLines.push(`[${d.label}] ${d.text}`)
                srtLines.push('')
            } else {
                showPartial(d.label, d.text)
            }
        })

        window.runtime.EventsOn('signal', (d) => {
            addSignalTag(d.signal, d.timestamp)
            sigLines.push(`[${d.timestamp}] ${d.signal}`)
        })

        window.runtime.EventsOn('error', (msg) => {
            showError(msg)
        })

        window.runtime.EventsOn('saved', (msg) => {
            showError('✓ ' + msg)  // reuse error bar for notifications
        })

        // ── Controls ───────────────────────────────────────────────────────────────
        function toggleRec() {
            if (!recording) {
                window.go.main.App.StartRecording(MIC_DEVICE, SPEAKER_DEVICE)
                    .then(r => { if (r !== 'ok') showError(r) })
            } else {
                window.go.main.App.StopRecording()
            }
        }

        function saveFiles() {
            const srt = srtLines.join('\n')
            const sigs = sigLines.join('\n')
            window.go.main.App.SaveFiles(srt, sigs)
                .then(r => showError(r === '' ? 'saved!' : r))
        }

        // ── Drag ───────────────────────────────────────────────────────────────────
        function dragStart(e) {
            if (e.target.closest('.t-btns')) return
            window.runtime.WindowStartDrag()
        }

        // ── UI helpers ─────────────────────────────────────────────────────────────
        function addLine(label, text) {
            const area = document.getElementById('tx-area')
            const div = document.createElement('div')
            div.className = 'line'
            div.innerHTML = `<span class="lbl ${label.toLowerCase()}">${label}</span><span class="tx">${esc(text)}</span>`
            area.appendChild(div)
            const lines = area.querySelectorAll('.line:not(#partial)')
            if (lines.length > 80) lines[0].remove()
            area.scrollTop = area.scrollHeight
        }

        function showPartial(label, text) {
            const p = document.getElementById('partial')
            document.getElementById('p-lbl').textContent = label
            document.getElementById('p-lbl').className = `lbl ${label.toLowerCase()}`
            document.getElementById('p-tx').textContent = text
            p.style.display = 'flex'
            document.getElementById('tx-area').appendChild(p)
            document.getElementById('tx-area').scrollTop = 99999
        }

        function hidePartial() {
            document.getElementById('partial').style.display = 'none'
        }

        function addSignalTag(signal, ts) {
            const strip = document.getElementById('sig-bar')
            const noSig = document.getElementById('no-sig')
            if (noSig) noSig.remove()

            const tokens = signal.match(/\[[A-Z_]+\]/g) || [signal]
            for (const t of tokens) {
                const span = document.createElement('span')
                span.className = 'tag'; span.title = ts; span.textContent = t
                strip.appendChild(span)
            }
            // Keep max 6 tags
            const tags = strip.querySelectorAll('.tag')
            if (tags.length > 6) for (let i = 0; i < tags.length - 6; i++) tags[i].remove()
        }

        function showError(msg) {
            const log = document.getElementById('err-log')
            log.style.display = 'block'
            const line = document.createElement('div')
            line.className = 'err-line'
            const ts = new Date().toLocaleTimeString('en-US', { hour12: false })
            line.textContent = `[${ts}] ${msg}`
            log.appendChild(line)
            log.scrollTop = log.scrollHeight
            // Keep max 20 error lines
            const lines = log.querySelectorAll('.err-line')
            if (lines.length > 20) lines[0].remove()
        }

        function msToSRT(ms) {
            const h = Math.floor(ms / 3600000)
            const m = Math.floor((ms % 3600000) / 60000)
            const s = Math.floor((ms % 60000) / 1000)
            const f = ms % 1000
            return `${pad(h)}:${pad(m)}:${pad(s)},${pad(f, 3)}`
        }
        function pad(n, l = 2) { return String(n).padStart(l, '0') }
        function esc(t) { return t.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') }
    </script>
</body>

</html>
